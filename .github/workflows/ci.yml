name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - run: dotnet --info

      - run: dotnet restore LocalJob.slnx

      - run: dotnet build LocalJob.slnx -c Release --no-restore

      - run: dotnet test LocalJob.slnx -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.trx'
